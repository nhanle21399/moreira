<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MOREIRA SYSTEM</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: monospace;
  color: white;
  overflow: hidden;
  background: black;
  cursor: none;
}

/* VIDEO */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
  min-width: 100%;
  min-height: 100%;
  object-fit: cover;          /* fill màn hình, giữ tỉ lệ */
  object-position: center;    /* căn giữa video */
  filter: brightness(0.8) grayscale(0%);
  z-index: -2;
}

/* OVERLAY */
.overlay {
   position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,0,0,0.03), rgba(0,0,0,0.2));
  z-index: -1;
}

/* PARTICLES */
#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  cursor: pointer;
  transition: 0.8s;
}

#intro.hide {
  opacity: 0;
  pointer-events: none;
}

#intro h1 {
  animation: glitch 1s infinite;
}

/* GLITCH */
@keyframes glitch {
  0% {text-shadow: 2px 0 red;}
  50% {text-shadow: -2px 0 blue;}
  100% {text-shadow: 2px 0 red;}
}

/* HERO */
.hero {
  position: absolute;
  top: 20%;
  width: 100%;
  text-align: center;
  z-index: 5;
  opacity: 0;
  transition: 1s;
  animation: float 3s infinite;
}

.hero.show { opacity: 1; }

.hero h1 {
  font-size: 60px;
  text-shadow: 0 0 20px white;
}

@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
  100% {transform: translateY(0);}
}

body {
  text-shadow: 0 0 5px rgba(255,255,255,0.2);
}
  
/* TERMINAL */
#terminal {
  position: absolute;
  top: 35%;
  width: 100%;
  text-align: center;
  font-size: 14px;
  opacity: 0;
  transition: 1s;
}

#terminal.show { opacity: 0.7; }

/* MAIN */
.container {
  display: flex;
  height: 100vh;
  opacity: 0;
  transition: 1s;
}

.container.show { opacity: 1; }

/* SIDE */
.side {
  box-shadow: inset 0 0 10px rgba(0,255,255,0.02); /* blur nhẹ để text nổi */
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
}

.left {
  border-right: none; /* bỏ line trắng */
}
  
/* CARD */
.card {
  border: 1px solid rgba(255,255,255,0.2);
  padding: 15px;
  margin: 10px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}
  
/* ICON */
.icons a {
  margin: 5px;
  font-size: 20px;
  color: white;
  text-decoration: none;
}

.icons a:hover {
  color: cyan;
  text-shadow: 0 0 10px cyan;
}

/* CURSOR */
.cursor {
  width: 14px;
  height: 14px;
  background: white;
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 15px white, 0 0 30px cyan;
  z-index: 999;
}

/* ICON */
.icons a {
  cursor: pointer;
}
  
/* MUSIC */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  border: 1px solid white;
  padding: 8px 15px;
  cursor: pointer;
}

/* MOBILE */
@media(max-width:768px){
  .container { flex-direction: column; }
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
  <source src="https://res.cloudinary.com/deined7re/video/upload/v1774012243/Anime_Red_Eye_%EF%B8%8F_4K_Wallpaper_Intense_Gaze_For_PC_eye_animeeyes_redeye_-_Jinx_Live_1080p_h264_wdujbs.mp4">
</video>

<div class="overlay"></div>
<canvas id="particles"></canvas>
<div class="cursor" id="cursor"></div>

<!-- INTRO -->
<div id="intro" onclick="enterSite()">
  <h1>ENTER SYSTEM</h1>
</div>

<!-- HERO -->
<div class="hero" id="hero">
  <h1>MOREIRA</h1>
  <p id="typing"></p>
</div>

<!-- TERMINAL -->
<div id="terminal">
  <p>> initializing system...</p>
  <p>> connecting liquidity...</p>
  <p>> scanning market...</p>
  <p>> ready.</p>
</div>

<!-- MAIN -->
<div class="container" id="main">

<div class="side left">
  <h2>ESPORT</h2>

  <img src="https://lanyard.cnrad.dev/api/375870617041240064" width="200">

  <div class="icons">
    <a href="https://discord.gg/2W96ej7B">💬</a>
    <a href="#">🎮</a>
    <a href="#">📺</a>
  </div>
</div>

<div class="side">
  <h2>TRADER</h2>

  <div class="card" id="tradeBox">
    <p>PAIR: XAUUSD</p>
    <p>STATUS: WAITING...</p>
  </div>

  <div class="icons">
    <a href="https://vn.tradingview.com/chart/qjYmgyGN/">📊</a>
  </div>
</div>

</div>

<div id="musicBtn" onclick="toggleMusic()">MUSIC: OFF</div>

<audio id="music" loop>
  <source src="https://files.catbox.moe/fh9v4n.mp3">
</audio>

<script>
let music = document.getElementById("music");
let btn = document.getElementById("musicBtn");
let isPlaying = false;

function enterSite() {
  intro.classList.add("hide");
  main.classList.add("show");
  hero.classList.add("show");

  setTimeout(()=>{
    terminal.classList.add("show");
  },1000);

  music.play().then(()=>{
    isPlaying = true;
    btn.innerText = "MUSIC: ON";
  });
}

let cursor = document.getElementById("cursor");
let mouseX = 0, mouseY = 0;
let curX = 0, curY = 0;

document.addEventListener("mousemove", e=>{
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function animateCursor(){
  curX += (mouseX - curX) * 0.15; // mượt hơn
  curY += (mouseY - curY) * 0.15;

  cursor.style.left = curX + "px";
  cursor.style.top = curY + "px";

  requestAnimationFrame(animateCursor);
}
animateCursor();

let lines=[
"> connecting liquidity...",
"> scanning smart money...",
"> detecting FVG...",
"> ready."
];

/* MUSIC */
function toggleMusic() {
  if(isPlaying){ music.pause(); btn.innerText="MUSIC: OFF"; }
  else { music.play(); btn.innerText="MUSIC: ON"; }
  isPlaying=!isPlaying;
}

/* CURSOR */
document.addEventListener("mousemove", e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

/* TYPING */
let text="TRADER | GAMER | DEV";
let i=0;
function typing(){
  if(i<text.length){
    typingEl.innerHTML+=text[i];
    i++;
    setTimeout(typing,80);
  }
}
let typingEl=document.getElementById("typing");

/* PARTICLES */
let canvas=document.getElementById("particles");
let ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let p=[];
for(let i=0;i<60;i++){
  p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height});
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  p.forEach(a=>{
    ctx.fillRect(a.x,a.y,2,2);
  });
  requestAnimationFrame(draw);
}
draw();

/* FAKE REALTIME TRADE */
setInterval(()=>{
  let types=["BUY","SELL"];
  let pair="XAUUSD";
  let price=(4670+Math.random()*100).toFixed(2);

  document.getElementById("tradeBox").innerHTML=
  `
  <p>${types[Math.floor(Math.random()*2)]} ${pair}</p>
  <p>ENTRY: ${price}</p>
  <p>STATUS: EXECUTED</p>
  `;
},5000);
</script>

</body>
</html>
