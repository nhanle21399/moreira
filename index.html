<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Moreira</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: monospace;
}

.container {
  display: flex;
  height: 100vh;
}

.side {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: 0.4s;
}

.left {
  border-right: 1px solid rgba(255,255,255,0.2);
}

.side:hover {
  background: rgba(255,255,255,0.05);
}

h1 {
  letter-spacing: 3px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background: none;
  border: 1px solid white;
  color: white;
  cursor: pointer;
}

button:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>

<div class="container">

<div class="side left">
  <h1>ESPORT</h1>
  <p>TFT PLAYER</p>
  <button onclick="window.open('https://discord.gg/yourlink')">JOIN</button>
</div>

<div class="side">
  <h1>TRADER</h1>
  <p>NAS100 | ICT</p>
  <button onclick="window.open('https://discord.gg/yourlink')">SIGNAL</button>
</div>

</div>

<audio autoplay loop>
  <source src="LINK_MP3">
</audio>

</body>
</html>
