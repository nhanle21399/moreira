<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MOREIRA SYSTEM</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: monospace;
  color: white;
  overflow: hidden;
  background: black;
  cursor: none;
}

/* VIDEO */
video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.3) grayscale(100%);
  z-index: -2;
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,0,0,0.2), rgba(0,0,0,0.9));
  z-index: -1;
}

/* PARTICLES */
#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  cursor: pointer;
  transition: 0.8s;
}

#intro.hide {
  opacity: 0;
  pointer-events: none;
}

#intro h1 {
  animation: glitch 1s infinite;
}

/* GLITCH */
@keyframes glitch {
  0% {text-shadow: 2px 0 red;}
  50% {text-shadow: -2px 0 blue;}
  100% {text-shadow: 2px 0 red;}
}

/* HERO */
.hero {
  position: absolute;
  top: 20%;
  width: 100%;
  text-align: center;
  z-index: 5;
  opacity: 0;
  transition: 1s;
  animation: float 3s infinite;
}

.hero.show { opacity: 1; }

.hero h1 {
  font-size: 60px;
  text-shadow: 0 0 20px white;
}

@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
  100% {transform: translateY(0);}
}

/* TERMINAL */
#terminal {
  position: absolute;
  top: 35%;
  width: 100%;
  text-align: center;
  font-size: 14px;
  opacity: 0;
  transition: 1s;
}

#terminal.show { opacity: 0.7; }

/* MAIN */
.container {
  display: flex;
  height: 100vh;
  opacity: 0;
  transition: 1s;
}

.container.show { opacity: 1; }

/* SIDE */
.side {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(6px);
}

.left {
  border-right: 1px solid rgba(255,255,255,0.1);
}

/* CARD */
.card {
  border: 1px solid rgba(255,255,255,0.2);
  padding: 15px;
  margin: 10px;
}

/* ICON */
.icons a {
  margin: 5px;
  font-size: 20px;
  color: white;
  text-decoration: none;
}

.icons a:hover {
  color: cyan;
  text-shadow: 0 0 10px cyan;
}

/* CURSOR */
.cursor {
  width: 10px;
  height: 10px;
  background: white;
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
}

/* MUSIC */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  border: 1px solid white;
  padding: 8px 15px;
  cursor: pointer;
}

/* MOBILE */
@media(max-width:768px){
  .container { flex-direction: column; }
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
  <source src="https://cdn.coverr.co/videos/coverr-anime-style-city-1560/1080p.mp4">
</video>

<div class="overlay"></div>
<canvas id="particles"></canvas>
<div class="cursor" id="cursor"></div>

<!-- INTRO -->
<div id="intro" onclick="enterSite()">
  <h1>ENTER SYSTEM</h1>
</div>

<!-- HERO -->
<div class="hero" id="hero">
  <h1>MOREIRA</h1>
  <p id="typing"></p>
</div>

<!-- TERMINAL -->
<div id="terminal">
  <p>> initializing system...</p>
  <p>> connecting liquidity...</p>
  <p>> scanning market...</p>
  <p>> ready.</p>
</div>

<!-- MAIN -->
<div class="container" id="main">

<div class="side left">
  <h2>ESPORT</h2>

  <img src="https://lanyard.cnrad.dev/api/375870617041240064" width="200">

  <div class="icons">
    <a href="https://discord.gg/2W96ej7B">💬</a>
    <a href="#">🎮</a>
    <a href="#">📺</a>
  </div>
</div>

<div class="side">
  <h2>TRADER</h2>

  <div class="card" id="tradeBox">
    <p>PAIR: XAUUSD</p>
    <p>STATUS: WAITING...</p>
  </div>

  <div class="icons">
    <a href="https://vn.tradingview.com/chart/qjYmgyGN/">📊</a>
  </div>
</div>

</div>

<div id="musicBtn" onclick="toggleMusic()">MUSIC: OFF</div>

<audio id="music" loop>
  <source src="https://files.catbox.moe/fh9v4n.mp3">
</audio>

<script>
let music = document.getElementById("music");
let btn = document.getElementById("musicBtn");
let isPlaying = false;

function enterSite() {
  intro.classList.add("hide");
  main.classList.add("show");
  hero.classList.add("show");

  setTimeout(()=>{
    terminal.classList.add("show");
  },1000);

  music.play().then(()=>{
    isPlaying = true;
    btn.innerText = "MUSIC: ON";
  });
}

/* MUSIC */
function toggleMusic() {
  if(isPlaying){ music.pause(); btn.innerText="OFF"; }
  else { music.play(); btn.innerText="ON"; }
  isPlaying=!isPlaying;
}

/* CURSOR */
document.addEventListener("mousemove", e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

/* TYPING */
let text="TRADER | GAMER | DEV";
let i=0;
function typing(){
  if(i<text.length){
    typingEl.innerHTML+=text[i];
    i++;
    setTimeout(typing,80);
  }
}
let typingEl=document.getElementById("typing");
typing();

/* PARTICLES */
let canvas=document.getElementById("particles");
let ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;

let p=[];
for(let i=0;i<60;i++){
  p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height});
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  p.forEach(a=>{
    ctx.fillRect(a.x,a.y,2,2);
  });
  requestAnimationFrame(draw);
}
draw();

/* FAKE REALTIME TRADE */
setInterval(()=>{
  let types=["BUY","SELL"];
  let pair="XAUUSD";
  let price=(4670+Math.random()*100).toFixed(2);

  document.getElementById("tradeBox").innerHTML=
  `
  <p>${types[Math.floor(Math.random()*2)]} ${pair}</p>
  <p>ENTRY: ${price}</p>
  <p>STATUS: EXECUTED</p>
  `;
},5000);
</script>

</body>
</html>
