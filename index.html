<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>𝖒𝖔𝖗𝖊𝖎𝖗𝖆</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: monospace;
  overflow: hidden;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 10;
}

#intro h1 {
  opacity: 0.7;
  letter-spacing: 3px;
}

/* MAIN */
.container {
  display: flex;
  height: 100vh;
  opacity: 0;
  transition: 1s;
}

.side {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: 0.4s;
}

.left {
  border-right: 1px solid rgba(255,255,255,0.2);
}

.side:hover {
  background: rgba(255,255,255,0.05);
}

h1 {
  letter-spacing: 3px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  background: none;
  border: 1px solid white;
  color: white;
  cursor: pointer;
}

button:hover {
  background: white;
  color: black;
}
</style>
</head>

<body>

<!-- INTRO SCREEN -->
<div id="intro" onclick="enterSite()">
  <h1>CLICK TO ENTER</h1>
</div>

<!-- MAIN CONTENT -->
<div class="container" id="main">

<div class="side left">
  <h1>ESPORT</h1>
  <p>Psychosis Player</p>
  <button onclick="window.open('https://discord.gg/2W96ej7B')">JOIN</button>
</div>

<div class="side">
  <h1>ICT TRADER</h1>
  <p>| XAUUSD |</p>
  <button onclick="window.open('https://vn.tradingview.com/chart/qjYmgyGN/?symbol=OANDA%3AXAUUSD')">SIGNAL</button>
</div>

</div>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="https://files.catbox.moe/fh9v4n.mp3">
</audio>

<script>
function enterSite() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.opacity = "1";
  document.getElementById("music").play();
}
</script>

</body>
</html>
