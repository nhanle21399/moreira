<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MOREIRA SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { transition: all 0.3s ease; }

body {
  margin: 0;
  font-family: monospace;
  color: white;
  overflow: hidden;
  cursor: none;
}

/* VIDEO ANIME */
#bgVideo {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -3;
  filter: brightness(0.6) contrast(1.2);
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: -1;
}

/* HERO */
.hero {
  position: absolute;
  top: 20%;
  width: 100%;
  text-align: center;
  z-index: 5;
  opacity: 0;
  animation: float 3s infinite;
}

.hero.show { opacity: 1; }

.hero h1 {
  font-size: 70px;
  text-shadow: 0 0 10px white, 0 0 20px cyan, 0 0 40px cyan;
}

.line {
  width: 200px;
  height: 1px;
  background: cyan;
  margin: 10px auto;
  box-shadow: 0 0 10px cyan;
}

/* MAIN */
.container {
  display: flex;
  height: 100vh;
  opacity: 0;
}
.container.show { opacity: 1; }

/* SIDE */
.side {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(10px);
}

.left {
  border-right: 1px solid rgba(255,255,255,0.1);
}

/* CARD */
.card {
  background: rgba(0,0,0,0.4);
  border: 1px solid cyan;
  padding: 15px;
}

/* ICON */
.icons a {
  margin: 8px;
  font-size: 22px;
  color: white;
  text-decoration: none;
}

.icons a:hover {
  color: cyan;
  text-shadow: 0 0 10px cyan;
}

/* MUSIC */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  border: 1px solid white;
  padding: 8px 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- ANIME VIDEO -->
<video autoplay muted loop playsinline id="bgVideo">
  <source src="https://cdn.coverr.co/videos/coverr-anime-style-city-1560/1080p.mp4">
</video>

<div class="overlay"></div>

<!-- HERO -->
<div class="hero" id="hero">
  <h1>MOREIRA</h1>
  <div class="line"></div>
  <p id="typing"></p>
</div>

<!-- MAIN -->
<div class="container" id="main">

<div class="side left">
  <h2>ESPORT</h2>

  <img src="https://lanyard.cnrad.dev/api/375870617041240064?theme=dark">

  <div class="icons">
    <a href="https://discord.gg/2W96ej7B">💬</a>
    <a href="#">🎮</a>
    <a href="#">📺</a>
  </div>
</div>

<div class="side">
  <h2>TRADER</h2>

  <div class="card" id="tradeBox"></div>

  <div class="icons">
    <a href="https://vn.tradingview.com/chart/qjYmgyGN/">📊</a>
  </div>
</div>

</div>

<!-- MUSIC -->
<div id="musicBtn" onclick="toggleMusic()">MUSIC: OFF</div>

<audio id="music" loop>
  <source src="https://files.catbox.moe/fh9v4n.mp3">
</audio>

<script>
let music = document.getElementById("music");
let btn = document.getElementById("musicBtn");
let isPlaying = false;

/* ENTER AUTO */
window.onload = () => {
  hero.classList.add("show");
  main.classList.add("show");
}

/* MUSIC */
function toggleMusic(){
  if(isPlaying){
    music.pause();
    btn.innerText="MUSIC: OFF";
  }else{
    music.play();
    btn.innerText="MUSIC: ON";
  }
  isPlaying=!isPlaying;
}

/* TYPING */
let t="TRADER | GAMER | DEV",i=0;
let typingEl=document.getElementById("typing");

function typing(){
  if(i<t.length){
    typingEl.innerHTML+=t[i++];
    setTimeout(typing,80);
  }
}
typing();

/* FAKE TRADE */
setInterval(()=>{
  tradeBox.innerHTML=`<p>BUY XAUUSD</p><p>${(2000+Math.random()*100).toFixed(2)}</p>`;
},3000);
</script>

</body>
</html>
