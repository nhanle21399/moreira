<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>𝖒𝖔𝖗𝖊𝖎𝖗𝖆</title>

<style>
body {
  margin: 0;
  color: white;
  font-family: monospace;
  cursor: crosshair;
  user-select: none;
  overflow: hidden;
}

/* VIDEO BACKGROUND */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(100%) brightness(0.3);
  z-index: -1;
}

/* FILM GRAIN */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://grainy-gradients.vercel.app/noise.svg');
  opacity: 0.05;
  pointer-events: none;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 10;
  transition: 0.5s;
}

#intro h1 {
  animation: glitch 1s infinite;
}

/* GLITCH */
@keyframes glitch {
  0% {text-shadow: 2px 0 red;}
  50% {text-shadow: -2px 0 blue;}
  100% {text-shadow: 2px 0 red;}
}

/* MAIN */
.container {
  display: flex;
  height: 100vh;
  opacity: 0;
  transition: 1s;
}

.side {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(4px);
  transition: 0.4s;
}

.left {
  border-right: 1px solid rgba(255,255,255,0.1);
}

.side:hover {
  background: rgba(255,255,255,0.05);
}

button {
  margin-top: 10px;
  padding: 10px;
  border: 1px solid white;
  background: none;
  color: white;
  cursor: pointer;
}

/* MUSIC BUTTON */
#toggleMusic {
  position: fixed;
  bottom: 20px;
  right: 20px;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop>
  <source src="https://cdn.coverr.co/videos/coverr-anime-style-city-1560/1080p.mp4">
</video>

<button id="toggleMusic" onclick="toggleMusic()">MUSIC</button>

<!-- INTRO -->
<div id="intro" onclick="enterSite()">
  <h1>ENTER SYSTEM</h1>
</div>

<!-- MAIN -->
<div class="container" id="main">

<div class="side left">
  <h1>ESPORT</h1>
  <p>ALL GAMES PLAYER</p>

  <!-- DISCORD STATUS -->
  <img src="https://lanyard.cnrad.dev/api/375870617041240064" width="200">

  <button onclick="window.open('https://discord.gg/2W96ej7B')">JOIN</button>
</div>

<div class="side">
  <h1>TRADER</h1>

  <!-- TRADINGVIEW -->
  <iframe src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD"
  width="300" height="200"></iframe>

  <button onclick="window.open('https://vn.tradingview.com/chart/qjYmgyGN/')">SIGNAL</button>
</div>

</div>

<audio id="music" loop>
  <source src="https://files.catbox.moe/fh9v4n.mp3">
</audio>

<script>
let isPlaying = false;

function enterSite() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("main").style.opacity = "1";
  document.getElementById("music").play();
  isPlaying = true;
}

function toggleMusic() {
  let music = document.getElementById("music");
  if (isPlaying) {
    music.pause();
  } else {
    music.play();
  }
  isPlaying = !isPlaying;
}
</script>

</body>
</html>
