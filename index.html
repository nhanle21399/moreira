<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>𝖒𝖔𝖗𝖊𝖎𝖗𝖆</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: monospace;
  cursor: crosshair;
  user-select: none;
}

/* FILM GRAIN */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://grainy-gradients.vercel.app/noise.svg');
  opacity: 0.05;
  pointer-events: none;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 10;
  transition: 0.5s;
}

#intro h1 {
  opacity: 0.7;
  letter-spacing: 6px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% {opacity: 0.3;}
  50% {opacity: 1;}
  100% {opacity: 0.3;}
}

/* MAIN */
.container {
  display: flex;
  height: 100vh;
  opacity: 0;
  transition: 1s;
}

.side {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: 0.4s;
  will-change: transform;
}

.left {
  border-right: 1px solid rgba(255,255,255,0.08);
}

.side:hover {
  background: rgba(255,255,255,0.08);
  transform: scale(1.04);
}

h1 {
  letter-spacing: 3px;
}

p {
  margin: 5px 0;
}

.sub {
  opacity: 0.5;
  font-size: 12px;
}

/* BUTTON */
button {
  margin-top: 12px;
  padding: 10px 20px;
  background: none;
  border: 1px solid white;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: white;
  color: black;
  transform: scale(1.05);
}

/* MUSIC BUTTON */
#toggleMusic {
  position: fixed;
  bottom: 20px;
  right: 20px;
  font-size: 12px;
}

/* MOBILE */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .left {
    border-right: none;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
}
</style>
</head>

<body>

<!-- MUSIC BUTTON -->
<button id="toggleMusic" onclick="toggleMusic()">MUSIC OFF</button>

<!-- INTRO -->
<div id="intro" onclick="enterSite()">
  <h1>ENTER SYSTEM</h1>
</div>

<!-- MAIN -->
<div class="container" id="main">

<div class="side left">
  <h1>ESPORT</h1>
  <p>PSYCHOSIS PLAYER</p>
  <p class="sub">COMPETITIVE TFT</p>
  <button onclick="window.open('https://discord.gg/2W96ej7B')">JOIN</button>
</div>

<div class="side">
  <h1>ICT TRADER</h1>
  <p>SMART MONEY</p>
  <p class="sub">XAUUSD | LIQUIDITY</p>
  <button onclick="window.open('https://vn.tradingview.com/chart/qjYmgyGN/?symbol=OANDA%3AXAUUSD')">SIGNAL</button>
</div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://files.catbox.moe/fh9v4n.mp3">
</audio>

<script>
let isPlaying = false;

function enterSite() {
  const intro = document.getElementById("intro");

  intro.style.opacity = "0";

  setTimeout(() => {
    intro.style.display = "none";
    document.getElementById("main").style.opacity = "1";

    let music = document.getElementById("music");
    music.play();
    isPlaying = true;
    updateButton();
  }, 500);
}

function toggleMusic() {
  let music = document.getElementById("music");

  if (isPlaying) {
    music.pause();
    isPlaying = false;
  } else {
    music.play();
    isPlaying = true;
  }

  updateButton();
}

function updateButton() {
  document.getElementById("toggleMusic").innerText = isPlaying ? "MUSIC ON" : "MUSIC OFF";
}
</script>

</body>
</html>
