<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MOREIRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FontAwesome for social icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body {
  margin: 0;
  font-family: monospace;
  color: white;
  overflow: hidden;
  background: black;
  cursor: none;
  text-shadow: 0 0 5px rgba(255,255,255,0.2);
}

/* VIDEO BACKGROUND */
video {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  transform: translate(-50%, -50%) scale(1.05);
  filter: brightness(0.5);
  opacity: 0.7;
  z-index: -2;
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: -1;
}

/* PARTICLES */
#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  cursor: pointer;
  transition: 0.8s;
}
#intro.hide { opacity: 0; pointer-events: none; }
#intro h1 { animation: glitch 1s infinite; }

/* GLITCH */
@keyframes glitch {
  0% {text-shadow: 2px 0 red;}
  50% {text-shadow: -2px 0 blue;}
  100% {text-shadow: 2px 0 red;}
}

/* HERO */
.hero {
  position: absolute;
  top: 20%;
  width: 100%;
  text-align: center;
  z-index: 5;
  opacity: 0;
  transition: 1s;
  animation: float 3s infinite;
}
.hero.show { opacity: 1; }
.hero h1 { font-size: 60px; text-shadow: 0 0 20px white; }

@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
  100% {transform: translateY(0);}
}

/* TERMINAL */
#terminal {
  position: absolute;
  top: 35%;
  width: 100%;
  text-align: center;
  font-size: 14px;
  opacity: 0;
  transition: 1s;
}
#terminal.show { opacity: 0.7; }

/* MAIN */
.container {
  display: flex;
  height: 100vh;
  opacity: 0;
  transition: 1s;
}
.container.show { opacity: 1; }

/* SIDE PANELS */
.side {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: transparent;
}

/* CARD */
.card {
  background: rgba(80,80,80,0.2);
  padding: 15px 20px;
  border-radius: 10px;
  min-width: 200px;
  text-align: left;
  backdrop-filter: blur(5px);
  box-shadow: 0 0 10px rgba(255,255,255,0.1);
}

/* SOCIAL ICONS */
.icons {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 20px;
}
.icons img {
  width: 28px;
  height: 28px;
  transition: 0.3s;
}

.icons img:hover {
  transform: scale(1.3);
  filter: drop-shadow(0 0 10px cyan);
}
.icons a {
  position: relative;
  z-index: 10;
  pointer-events: auto;
}
.icons a {
  color: white;
  transition: 0.3s;
  font-size: 2rem;
}
.icons a:hover {
  color: cyan;
  transform: scale(1.3);
  text-shadow: 0 0 15px cyan;
}
canvas, .overlay {
  pointer-events: none;
}

/* CURSOR */
.cursor {
  width: 14px;
  height: 14px;
  background: white;
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 15px white, 0 0 30px cyan;
  z-index: 999;
}

/* MUSIC BUTTON */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  border: 1px solid white;
  padding: 8px 15px;
  cursor: pointer;
}

/* MOBILE */
@media(max-width:768px){
  .container { flex-direction: column; }
}

/* ===== Discord Lanyard rectangle professional (UPDATED) ===== */
.discord-lanyard-box {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 15px;
  border-radius: 12px;
  background: rgba(30,30,30,0.7);
  min-width: 200px;
  max-width: 280px;
  flex-direction: row;
  transition: all 0.3s;
}

.discord-lanyard-box:hover { background: rgba(50,50,50,0.9); }

.discord-lanyard-box img {
  width: 55px;
  height: 55px;
  border-radius: 8px;
  object-fit: cover;
  background-color: #999999;
}

.discord-lanyard-box .username {
  font-weight: 600;
  color: #fff;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}

.discord-lanyard-box .badge-icon {
  width: 18px;
  height: 18px;
}

.discord-lanyard-box .status-text {
  font-size: 13px;
  font-weight: 500;
  color: #ccc;
  display: flex;
  align-items: center;
  gap: 6px;
}

.discord-lanyard-box .status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #747f8d;
  animation: pulse 1.6s infinite;
}

.discord-lanyard-box .guild-tag {
  background-color: #7289da;
  color: #fff;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.75em;
  margin-top: 4px;
  display: inline-block;
}

.discord-lanyard-box .activity {
  font-size: 12px;
  color: #a0a0a0;
  margin-top: 4px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.4); opacity: 0.7; }
  100% { transform: scale(1); opacity: 1; }
}

</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline>
  <source src="https://res.cloudinary.com/deined7re/video/upload/v1774012243/Anime_Red_Eye_%EF%B8%8F_4K_Wallpaper_Intense_Gaze_For_PC_eye_animeeyes_redeye_-_Jinx_Live_1080p_h264_wdujbs.mp4">
</video>

<div class="overlay"></div>
<canvas id="particles"></canvas>
<div class="cursor" id="cursor"></div>

<!-- INTRO -->
<div id="intro" onclick="enterSite()">
  <h1>"TALK LESS, DO MORE"</h1>
</div>

<!-- HERO -->
<div class="hero" id="hero">
  <h1>MOREIRA</h1>
  <p id="typing"></p>
</div>

<!-- TERMINAL -->
<div id="terminal">
  <p> "idk"</p>
</div>

<!-- MAIN -->
<div class="container" id="main">

  <!-- ESPORT SIDE -->
  <div class="side left">
    <h2>ESPORT</h2>

    <!-- Discord Lanyard live rectangle -->
    <div class="discord-lanyard-box">
      <img src="" alt="avatar">
      <div>
        <div class="username">Loading...</div>
        <div class="status-text"><span class="status-dot"></span> Loading</div>
        <div class="guild-tag"></div>
        <div class="activity"></div>
      </div>
    </div>

    <!-- Social icons -->
    <div class="icons">
      <a href="https://discord.gg/2W96ej7B" target="_blank" title="Discord"><i class="fab fa-discord"></i></a>
      <a href="https://twitter.com" target="_blank" title="Twitter"><i class="fab fa-twitter"></i></a>
      <a href="https://youtube.com" target="_blank" title="YouTube"><i class="fab fa-youtube"></i></a>
      <a href="https://twitch.tv" target="_blank" title="Twitch"><i class="fab fa-twitch"></i></a>
      <a href="https://konect.gg" target="_blank" title="Konect">
        <img src="https://cdn.prod.website-files.com/63e63cfe6e9d6e27c1b3d66d/63e63cfe6e9d6e3d3cb3d68c_konect-logo.png" width="28">
      </a>
    </div>
  </div>

  <!-- TRADER SIDE -->
  <div class="side">
    <h2>TRADER</h2>
    <div class="card" id="tradeBox">
      <p>PAIR: XAUUSD</p>
      <p>STATUS: WAITING...</p>
    </div>
    <div class="icons">
      <a href="https://discord.gg/2W96ej7B" target="_blank" title="Discord">
        <i class="fab fa-discord"></i>
      </a>
    </div>
  </div>

</div>

<div id="musicBtn" onclick="toggleMusic()">MUSIC: OFF</div>
<audio id="music" loop>
  <source src="https://files.catbox.moe/fh9v4n.mp3">
</audio>

<script>
// MUSIC
let music = document.getElementById("music");
let btn = document.getElementById("musicBtn");
let isPlaying = false;
function toggleMusic() {
  if(isPlaying){ music.pause(); btn.innerText="MUSIC: OFF"; }
  else { music.play(); btn.innerText="MUSIC: ON"; }
  isPlaying=!isPlaying;
}

// ENTER SITE
function enterSite() {
  intro.classList.add("hide");
  main.classList.add("show");
  hero.classList.add("show");
  setTimeout(()=>{ terminal.classList.add("show"); },1000);
  music.play().then(()=>{ isPlaying=true; btn.innerText="MUSIC: ON"; });
}

// CURSOR
let cursor = document.getElementById("cursor");
let mouseX=0, mouseY=0, curX=0, curY=0;
document.addEventListener("mousemove", e=>{ mouseX=e.clientX; mouseY=e.clientY; });
function animateCursor(){
  curX += (mouseX - curX) * 0.15;
  curY += (mouseY - curY) * 0.15;
  cursor.style.left = curX + "px";
  cursor.style.top = curY + "px";
  requestAnimationFrame(animateCursor);
}
animateCursor();

// PARTICLES
let canvas=document.getElementById("particles");
let ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;
let p=[];
for(let i=0;i<60;i++){ p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height}); }
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  p.forEach(a=>{ ctx.fillRect(a.x,a.y,2,2); });
  requestAnimationFrame(draw);
}
draw();

// FAKE TRADE
async function getPrice(symbol) {
  try {
    let url = symbol === "XAUUSD"
      ? "https://api.gold-api.com/price/XAU"
      : "https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT";

    let res = await fetch(url);
    let data = await res.json();

    return symbol === "XAUUSD"
      ? data.price
      : parseFloat(data.price);
  } catch {
    return null;
  }
}

let showTrade = true;

async function updateTrade() {
  let box = document.getElementById("tradeBox");

  if (showTrade) {
    let symbol = "XAUUSD";
    let price = await getPrice(symbol);

    // nếu lỗi → dùng BTC
    if (!price) {
      symbol = "BTCUSDT";
      price = await getPrice(symbol);
    }

    let type = Math.random() > 0.5 ? "BUY" : "SELL";
    let entry = price + (Math.random() * 10 - 5);
    let current = price;
    let pnl = (type === "BUY" ? current - entry : entry - current).toFixed(2);

    box.innerHTML = `
      <p><b>${symbol}</b></p>
      <p>${type} @ ${entry.toFixed(2)}</p>
      <p>NOW: ${current.toFixed(2)}</p>
      <p style="color:${pnl >= 0 ? 'lime' : 'red'}">
        PNL: ${pnl}
      </p>
    `;

  } else {
    let trades = Math.floor(Math.random()*20)+5;
    let balance = (1000 + Math.random()*5000).toFixed(2);

    box.innerHTML = `
      <p><b>EXNESS</b></p>
      <p>Trades today: ${trades}</p>
      <p>Balance: $${balance}</p>
    `;
  }

  showTrade = !showTrade;
}

setInterval(updateTrade, 5000);
updateTrade();

/* === DISCORD LANYARD LIVE (Presence + Activities) === */
const DISCORD_USER_ID = "375870617041240064"; // Thay bằng Discord ID thật
const discordBox = document.querySelector(".discord-lanyard-box");
const avatarImg = discordBox.querySelector("img");
const usernameDiv = discordBox.querySelector(".username");
const statusText = discordBox.querySelector(".status-text");
const guildTagDiv = discordBox.querySelector(".guild-tag");
const activityDiv = discordBox.querySelector(".activity");

async function updateDiscord() {
  try {
    const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_USER_ID}`);
    const data = await res.json();
    if(!data.success) return;

    const user = data.data.discord_user;

    // Avatar
    const isGif = user.avatar && user.avatar.startsWith("a_");
    const ext = isGif ? "gif" : "png";
    avatarImg.src = user.avatar ? `https://cdn.discordapp.com/avatars/${DISCORD_USER_ID}/${user.avatar}.${ext}?size=128` : "https://via.placeholder.com/55";
    avatarImg.style.backgroundColor = "#999999";

    // Username + Badges
    usernameDiv.textContent = `${user.username}#${user.discriminator}`;
    // Remove old badges
    usernameDiv.querySelectorAll(".badge-icon").forEach(b=>b.remove());
    const flags = user.public_flags || 0;
    Object.keys(badgeIcons).forEach(bit=>{
      bit=parseInt(bit);
      if(flags & bit){
        const img = document.createElement("img");
        img.src = badgeIcons[bit];
        img.className = "badge-icon";
        usernameDiv.appendChild(img);
      }
    });

    // Status
    const status = data.data.discord_status || "offline";
    let color = "#747f8d"; // offline gray
    if(status==="online") color="#43b581";
    else if(status==="idle") color="#faa61a";
    else if(status==="dnd") color="#f04747";

    statusText.innerHTML = `<span class="status-dot" style="background:${color}"></span> ${status.toUpperCase()}`;
    
    // Activities
    activityDiv.innerHTML = "";
    const activities = data.data.activities || [];
    activities.forEach(act=>{
      let icon = act.assets?.small_image ? `<img src="https://cdn.discordapp.com/app-assets/${act.application_id}/${act.assets.small_image}.png" width="14" height="14"> `:"";
      let name = act.name || "";
      let details = act.details ? `: ${act.details}` : "";
      let activityEl = document.createElement("div");
      activityEl.innerHTML = `${icon}${name}${details}`;
      activityDiv.appendChild(activityEl);
    });

  } catch(e){ 
    console.error("Discord Lanyard error:", e);
    usernameDiv.textContent="Error";
    statusText.innerHTML='<span class="status-dot" style="background:#747f8d"></span> OFFLINE';
    guildTagDiv.textContent="";
    activityDiv.innerHTML="";
  }
}

updateDiscord();
setInterval(updateDiscord,15000);
</script>
</body>
</html>
