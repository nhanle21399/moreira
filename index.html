<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>𝖒𝖔𝖗𝖊𝖎𝖗𝖆</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  color: white;
  font-family: monospace;
  cursor: crosshair;
  user-select: none;
  overflow: hidden;
  background: black;
}

/* VIDEO */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(100%) brightness(0.3);
  z-index: -1;
}

/* NOISE */
body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('https://grainy-gradients.vercel.app/noise.svg');
  opacity: 0.05;
  pointer-events: none;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  z-index: 10;
  transition: opacity 0.6s ease;
}

#intro.hide {
  opacity: 0;
  pointer-events: none;
}

/* GLITCH */
#intro h1 {
  animation: glitch 1s infinite;
}

@keyframes glitch {
  0% {text-shadow: 2px 0 red;}
  50% {text-shadow: -2px 0 blue;}
  100% {text-shadow: 2px 0 red;}
}

/* MAIN */
.container {
  display: flex;
  height: 100vh;
  opacity: 0;
  transition: 1s;
}

.container.show {
  opacity: 1;
}

/* PANEL */
.side {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(6px);
  transition: 0.3s;
}

.left {
  border-right: 1px solid rgba(255,255,255,0.1);
}

.side:hover {
  background: rgba(255,255,255,0.08);
}

/* BUTTON */
button {
  margin-top: 10px;
  padding: 10px 20px;
  border: 1px solid white;
  background: none;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: white;
  color: black;
}

/* MUSIC BTN */
#toggleMusic {
  position: fixed;
  bottom: 20px;
  right: 20px;
}

/* MOBILE */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
  }

  .left {
    border-right: none;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline>
  <source src="https://cdn.coverr.co/videos/coverr-anime-style-city-1560/1080p.mp4">
</video>

<button id="toggleMusic" onclick="toggleMusic()">MUSIC: OFF</button>

<!-- INTRO -->
<div id="intro" onclick="enterSite()">
  <h1>ENTER SYSTEM</h1>
</div>

<!-- MAIN -->
<div class="container" id="main">

<div class="side left">
  <h1>ESPORT</h1>
  <p>ALL GAMES PLAYER</p>

  <img src="https://lanyard.cnrad.dev/api/375870617041240064" width="200">

  <button onclick="window.open('https://discord.gg/2W96ej7B')">JOIN</button>
</div>

<div class="side">
  <h1>TRADER</h1>

  <iframe 
    src="https://s.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD"
    width="300" height="200"
    frameborder="0">
  </iframe>

  <button onclick="window.open('https://vn.tradingview.com/chart/qjYmgyGN/')">SIGNAL</button>
</div>

</div>

<audio id="music" loop>
  <source src="https://files.catbox.moe/fh9v4n.mp3">
</audio>

<script>
let music = document.getElementById("music");
let btn = document.getElementById("toggleMusic");
let isPlaying = false;

function enterSite() {
  document.getElementById("intro").classList.add("hide");
  document.getElementById("main").classList.add("show");

  // Play music after user click (safe)
  music.play().then(() => {
    isPlaying = true;
    btn.innerText = "MUSIC: ON";
  }).catch(() => {});
}

function toggleMusic() {
  if (isPlaying) {
    music.pause();
    btn.innerText = "MUSIC: OFF";
  } else {
    music.play();
    btn.innerText = "MUSIC: ON";
  }
  isPlaying = !isPlaying;
}
</script>

</body>
</html>
