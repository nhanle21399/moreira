<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MOREIRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FontAwesome for social icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body {
  margin: 0;
  font-family: monospace;
  color: white;
  overflow: hidden;
  background: black;
  cursor: none;
}

/* VIDEO BACKGROUND */
video {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  transform: translate(-50%, -50%) scale(1.05);
  filter: brightness(0.5);
  opacity: 0.7;
  z-index: -2;
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: -1;
}

/* PARTICLES */
#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  cursor: pointer;
  transition: 0.8s;
}
#intro.hide {
  opacity: 0;
  pointer-events: none;
}
#intro h1 { animation: glitch 1s infinite; }

/* GLITCH */
@keyframes glitch {
  0% {text-shadow: 2px 0 red;}
  50% {text-shadow: -2px 0 blue;}
  100% {text-shadow: 2px 0 red;}
}

/* HERO */
.hero {
  position: absolute;
  top: 20%;
  width: 100%;
  text-align: center;
  z-index: 5;
  opacity: 0;
  transition: 1s;
  animation: float 3s infinite;
}
.hero.show { opacity: 1; }
.hero h1 { font-size: 60px; text-shadow: 0 0 20px white; }

@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
  100% {transform: translateY(0);}
}

body { text-shadow: 0 0 5px rgba(255,255,255,0.2); }

/* TERMINAL */
#terminal {
  position: absolute;
  top: 35%;
  width: 100%;
  text-align: center;
  font-size: 14px;
  opacity: 0;
  transition: 1s;
}
#terminal.show { opacity: 0.7; }

/* MAIN */
.container {
  display: flex;
  height: 100vh;
  opacity: 0;
  transition: 1s;
}
.container.show { opacity: 1; }

/* SIDE PANELS */
.side {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: transparent;
}

/* CARD */
.card {
  border: 1px solid rgba(255,255,255,0.2);
  padding: 15px;
  margin: 10px;
  transition: 0.3s;
}
.card:hover { transform: scale(1.05); }

/* SOCIAL ICONS */
.icons {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 20px;
}
.icons a {
  color: white;
  transition: 0.3s;
  font-size: 2rem;
}
.icons a:hover {
  color: cyan;
  transform: scale(1.3);
  text-shadow: 0 0 15px cyan;
}

/* CURSOR */
.cursor {
  width: 14px;
  height: 14px;
  background: white;
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 15px white, 0 0 30px cyan;
  z-index: 999;
}

/* MUSIC BUTTON */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  border: 1px solid white;
  padding: 8px 15px;
  cursor: pointer;
}

/* MOBILE */
@media(max-width:768px){
  .container { flex-direction: column; }
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline>
  <source src="https://res.cloudinary.com/deined7re/video/upload/v1774012243/Anime_Red_Eye_%EF%B8%8F_4K_Wallpaper_Intense_Gaze_For_PC_eye_animeeyes_redeye_-_Jinx_Live_1080p_h264_wdujbs.mp4">
</video>

<div class="overlay"></div>
<canvas id="particles"></canvas>
<div class="cursor" id="cursor"></div>

<!-- INTRO -->
<div id="intro" onclick="enterSite()">
  <h1>ENTER SYSTEM</h1>
</div>

<!-- HERO -->
<div class="hero" id="hero">
  <h1>MOREIRA</h1>
  <p id="typing"></p>
</div>

<!-- TERMINAL -->
<div id="terminal">
  <p>> "talk less, do more"</p>
</div>

<!-- MAIN -->
<div class="container" id="main">

  <!-- ESPORT SIDE -->
  <div class="side left">
    <h2>ESPORT</h2>
    <img src="https://lanyard.cnrad.dev/api/375870617041240064" width="250" height="250" style="border-radius: 50%; border: 3px solid cyan;">
    <div class="icons">
      <a href="https://discord.gg/2W96ej7B" target="_blank" title="Discord"><i class="fab fa-discord"></i></a>
      <a href="https://twitter.com" target="_blank" title="Twitter"><i class="fab fa-twitter"></i></a>
      <a href="https://youtube.com" target="_blank" title="YouTube"><i class="fab fa-youtube"></i></a>
      <a href="https://twitch.tv" target="_blank" title="Twitch"><i class="fab fa-twitch"></i></a>
    </div>
  </div>

  <!-- TRADER SIDE -->
  <div class="side">
    <h2>TRADER</h2>
    <div class="card" id="tradeBox">
      <p>PAIR: XAUUSD</p>
      <p>STATUS: WAITING...</p>
    </div>
    <div class="icons">
      <a href="https://vn.tradingview.com/chart/qjYmgyGN/" target="_blank" title="TradingView">📊</a>
    </div>
  </div>

</div>

<div id="musicBtn" onclick="toggleMusic()">MUSIC: OFF</div>
<audio id="music" loop>
  <source src="https://files.catbox.moe/fh9v4n.mp3">
</audio>

<script>
// MUSIC
let music = document.getElementById("music");
let btn = document.getElementById("musicBtn");
let isPlaying = false;
function toggleMusic() {
  if(isPlaying){ music.pause(); btn.innerText="MUSIC: OFF"; }
  else { music.play(); btn.innerText="MUSIC: ON"; }
  isPlaying=!isPlaying;
}

// ENTER SITE
function enterSite() {
  intro.classList.add("hide");
  main.classList.add("show");
  hero.classList.add("show");
  setTimeout(()=>{ terminal.classList.add("show"); },1000);
  music.play().then(()=>{ isPlaying=true; btn.innerText="MUSIC: ON"; });
}

// CURSOR
let cursor = document.getElementById("cursor");
let mouseX=0, mouseY=0, curX=0, curY=0;
document.addEventListener("mousemove", e=>{ mouseX=e.clientX; mouseY=e.clientY; });
function animateCursor(){
  curX += (mouseX - curX) * 0.15;
  curY += (mouseY - curY) * 0.15;
  cursor.style.left = curX + "px";
  cursor.style.top = curY + "px";
  requestAnimationFrame(animateCursor);
}
animateCursor();

// HERO TYPING
let text="TRADER | GAMER | DEV";
let i=0;
let typingEl=document.getElementById("typing");
function typing(){
  if(i<text.length){
    typingEl.innerHTML+=text[i];
    i++;
    setTimeout(typing,80);
  }
}
typing();

// PARTICLES
let canvas=document.getElementById("particles");
let ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;
let p=[];
for(let i=0;i<60;i++){ p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height}); }
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  p.forEach(a=>{ ctx.fillRect(a.x,a.y,2,2); });
  requestAnimationFrame(draw);
}
draw();

// FAKE TRADE
setInterval(()=>{
  let types=["BUY","SELL"];
  let pair="XAUUSD";
  let price=(4670+Math.random()*100).toFixed(2);
  document.getElementById("tradeBox").innerHTML=
    `<p>${types[Math.floor(Math.random()*2)]} ${pair}</p>
     <p>ENTRY: ${price}</p>
     <p>STATUS: EXECUTED</p>`;
},5000);
</script>

</body>
</html>
