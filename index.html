<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MOREIRA</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  color: white;
  overflow: hidden;
}

/* BACKGROUND */
#bg {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.6);
  z-index: -1;
}

/* CENTER */
.center {
  position: absolute;
  top: 20%;
  width: 100%;
  text-align: center;
}

.center h1 {
  font-size: 60px;
  margin: 0;
}

.center p {
  opacity: 0.7;
  letter-spacing: 3px;
}

/* MAIN */
.main {
  display: flex;
  height: 100vh;
}

/* SIDE */
.side {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(8px);
}

/* LEFT BORDER */
.left {
  border-right: 1px solid rgba(255,255,255,0.1);
}

/* CARD */
.card {
  border: 1px solid rgba(255,255,255,0.2);
  padding: 15px;
  margin-top: 10px;
}

/* ICON */
.icons a {
  margin: 10px;
  font-size: 20px;
  color: white;
  text-decoration: none;
}

.icons a:hover {
  opacity: 0.6;
}

/* MUSIC */
#music {
  position: fixed;
  bottom: 20px;
  right: 20px;
  border: 1px solid white;
  padding: 8px 15px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop id="bg">
  <source src="https://cdn.coverr.co/videos/coverr-anime-style-city-1560/1080p.mp4">
</video>

<!-- CENTER -->
<div class="center">
  <h1>MOREIRA</h1>
  <p>TRADER | GAMER | DEV</p>
</div>

<!-- MAIN -->
<div class="main">

<div class="side left">
  <h2>ESPORT</h2>

  <img src="https://lanyard.cnrad.dev/api/375870617041240064?theme=dark">

  <div class="icons">
    <a href="https://discord.gg/2W96ej7B">💬</a>
    <a href="#">🎮</a>
  </div>
</div>

<div class="side">
  <h2>TRADER</h2>

  <div class="card">
    <p>XAUUSD</p>
    <p>WAITING...</p>
  </div>

  <div class="icons">
    <a href="https://vn.tradingview.com/chart/qjYmgyGN/">📊</a>
  </div>
</div>

</div>

<!-- MUSIC -->
<div id="musicBtn">MUSIC</div>

<audio id="audio" loop>
  <source src="https://files.catbox.moe/fh9v4n.mp3">
</audio>

<script>
let audio = document.getElementById("audio");

document.getElementById("musicBtn").onclick = () => {
  if(audio.paused){
    audio.play();
  } else {
    audio.pause();
  }
};
</script>

</body>
</html>
