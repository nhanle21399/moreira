<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MOREIRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- FontAwesome for social icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>
body {
  margin: 0;
  font-family: monospace;
  color: white;
  overflow: hidden;
  background: black;
  cursor: none;
  text-shadow: 0 0 5px rgba(255,255,255,0.2);
}

/* VIDEO BACKGROUND */
video {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  transform: translate(-50%, -50%) scale(1.05);
  filter: brightness(0.5);
  opacity: 0.7;
  z-index: -2;
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: -1;
}

/* PARTICLES */
#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  cursor: pointer;
  transition: 0.8s;
}
#intro.hide {
  opacity: 0;
  pointer-events: none;
  visibility: hidden;
}
#intro h1 { animation: glitch 1s infinite; }

/* GLITCH */
@keyframes glitch {
  0% {text-shadow: 2px 0 red;}
  50% {text-shadow: -2px 0 blue;}
  100% {text-shadow: 2px 0 red;}
}

/* HERO */
.hero {
  position: absolute;
  top: 20%;
  width: 100%;
  text-align: center;
  z-index: 5;
  opacity: 0;
  transition: 1s;
  animation: float 3s infinite;
}
.hero.show { opacity: 1; }
.hero h1 { font-size: 60px; text-shadow: 0 0 20px white; }

@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
  100% {transform: translateY(0);}
}

/* TERMINAL */
#terminal {
  position: absolute;
  top: 35%;
  width: 100%;
  text-align: center;
  font-size: 14px;
  opacity: 0;
  transition: 1s;
}
#terminal.show { opacity: 0.7; }

/* MAIN */
.container {
  display: flex;
  height: 100vh;
  opacity: 0;
  transition: 1s;
}
.container.show { opacity: 1; }

/* SIDE PANELS */
.side {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: transparent;
}

/* CARD */
.card {
  background: rgba(20,20,20,0.6);
  padding: 18px 22px;
  border-radius: 12px;
  min-width: 240px;
  text-align: left;
  backdrop-filter: blur(10px);
  box-shadow: 
    0 0 10px rgba(0,0,0,0.5),
    0 0 20px rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.02);
  box-shadow: 
    0 0 20px rgba(0,255,255,0.2),
    0 0 40px rgba(0,255,255,0.1);
}

/* DISCORD CARD*/
.discord-card {
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(30,30,30,0.7);
  padding: 12px;
  border-radius: 14px;
  width: 260px;
}

.avatar-wrap {
  position: relative;
}

.avatar-wrap img {
  width: 50px;
  height: 50px;
  border-radius: 50%;
}

#statusDot {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 2px solid #1e1e1e;
}

.info .name {
  font-weight: 600;
  font-size: 15px;
}

.info .tag {
  font-size: 13px;
  color: #aaa;
}

.info .activity {
  font-size: 12px;
  color: #888;
}
  
/* SOCIAL ICONS */
.icons {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 20px;
}
.icons img {
  width: 28px;
  height: 28px;
  transition: 0.3s;
}

.icons img:hover {
  transform: scale(1.3);
  filter: drop-shadow(0 0 10px cyan);
}
.icons a {
  position: relative;
  z-index: 10;
  pointer-events: auto;
}
.icons a {
  color: white;
  transition: 0.3s;
  font-size: 2rem;
}
.icons a:hover {
  color: cyan;
  transform: scale(1.3);
  text-shadow: 0 0 15px cyan;
}
canvas, .overlay {
  pointer-events: none;
}

video {
  pointer-events: none;
}
/* CURSOR */
.cursor {
  width: 14px;
  height: 14px;
  background: white;
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 15px white, 0 0 30px cyan;
  z-index: 999;
}

/* MUSIC BUTTON */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  border: 1px solid white;
  padding: 8px 15px;
  cursor: pointer;
}

/* MOBILE */
@media(max-width:768px){
  .container { flex-direction: column; }
}

/* ===== Discord Lanyard rectangle professional (UPDATED) ===== */
.discord-lanyard-box {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 15px;
  border-radius: 12px;
  background: rgba(30,30,30,0.7);
  min-width: 200px;
  max-width: 280px;
  flex-direction: row;
  transition: all 0.3s;
}

.discord-lanyard-box:hover { background: rgba(50,50,50,0.9); }

.discord-lanyard-box img {
  width: 55px;
  height: 55px;
  border-radius: 8px;
  object-fit: cover;
  background-color: #999999;
}

.discord-lanyard-box .username {
  font-weight: 600;
  color: #fff;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 4px;
  flex-wrap: wrap;
}
.discord-lanyard-box .status-text {
  font-size: 13px;
  font-weight: 500;
  color: #ccc;
  display: flex;
  align-items: center;
  gap: 6px;
}

.discord-lanyard-box .status-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #747f8d;
  animation: pulse 1.6s infinite;
}
.discord-lanyard-box .activity {
  font-size: 12px;
  color: #a0a0a0;
  margin-top: 4px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.4); opacity: 0.7; }
  100% { transform: scale(1); opacity: 1; }
}

.badges {
  display: inline-flex;
  gap: 5px;
  margin-left: 6px;
}

.badges img {
  width: 16px;
  height: 16px;
  opacity: 0.8;
  transition: all 0.25s ease;
  cursor: pointer;
}

.badges img:hover {
  opacity: 1;
  transform: scale(1.25);
  filter: drop-shadow(0 0 6px #5865F2);
}

/* Hover Discord real */
.discord-card {
  transition: all 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}

.discord-card:hover {
  transform: translateY(-6px) scale(1.02);
  box-shadow:
    0 10px 30px rgba(0,0,0,0.6),
    0 0 20px rgba(88,101,242,0.3);
}

/* Avatar smooth */
.avatar-wrap img {
  transition: all 0.3s ease;
}

.discord-card:hover .avatar-wrap img {
  transform: scale(1.1);
}

/* Status glow */
#statusDot {
  transition: all 0.3s ease;
}

.discord-card:hover #statusDot {
  box-shadow: 0 0 10px currentColor;
}

.name {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
}  
  
</style>

</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline>
  <source src="https://res.cloudinary.com/deined7re/video/upload/v1774012243/Anime_Red_Eye_%EF%B8%8F_4K_Wallpaper_Intense_Gaze_For_PC_eye_animeeyes_redeye_-_Jinx_Live_1080p_h264_wdujbs.mp4">

<div class="overlay"></div>

<div class="cursor" id="cursor"></div>

<!-- INTRO -->
<div id="intro">
  <h1>"TALK LESS, DO MORE"</h1>
</div>

<!-- HERO -->

  <h1>MOREIRA</h1>

<!-- TERMINAL -->

  <p> "idk"</p>

<!-- MAIN -->
<div class="container" id="main">

  <!-- ESPORT SIDE -->
  <div class="side left">
    <h2>ESPORT</h2>

    <!-- Discord Lanyard live rectangle -->
    <div class="discord-card">
  <div class="avatar-wrap">

<audio id="music" loop>
  <source src="https://files.catbox.moe/fh9v4n.mp3">
</audio>

<script>
// MUSIC
let music = document.getElementById("music");
let btn = document.getElementById("musicBtn");
let isPlaying = false;
function toggleMusic() {
  if(isPlaying){ music.pause(); btn.innerText="MUSIC: OFF"; }
  else { music.play(); btn.innerText="MUSIC: ON"; }
  isPlaying=!isPlaying;
}

// ENTER SITE
function enterSite() {
  let intro = document.getElementById("intro");
  let main = document.getElementById("main");
  let hero = document.getElementById("hero");
  let terminal = document.getElementById("terminal");

  intro.classList.add("hide");
  main.classList.add("show");
  hero.classList.add("show");
  setTimeout(()=>{ terminal.classList.add("show"); },1000);
  music.play().then(()=>{
  isPlaying = true;
  btn.innerText="MUSIC: ON";
}).catch(()=>{
  console.log("Autoplay blocked");
});
}

// CURSOR
let cursor = document.getElementById("cursor");
let mouseX=0, mouseY=0, curX=0, curY=0;
document.addEventListener("mousemove", e=>{ mouseX=e.clientX; mouseY=e.clientY; });
function animateCursor(){
  curX += (mouseX - curX) * 0.15;
  curY += (mouseY - curY) * 0.15;
  cursor.style.left = curX + "px";
  cursor.style.top = curY + "px";
  requestAnimationFrame(animateCursor);
}
animateCursor();

// PARTICLES
let canvas=document.getElementById("particles");
let ctx=canvas.getContext("2d");
canvas.width=innerWidth;
canvas.height=innerHeight;
let p=[];
for(let i=0;i<60;i++){ p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height}); }
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  p.forEach(a=>{ ctx.fillRect(a.x,a.y,2,2); });
  requestAnimationFrame(draw);
}
draw();

// FAKE TRADE
async function getPrice(symbol) {
  try {
    let url = symbol === "XAUUSD"
      ? "https://api.gold-api.com/price/XAU"
      : "https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT";

    let res = await fetch(url);
    let data = await res.json();

    return symbol === "XAUUSD"
      ? data.price
      : parseFloat(data.price);
  } catch {
    return null;
  }
}

let currentTrade = null;
let tradeStartTime = Date.now();
  
async function updateTrade() {
  let box = document.getElementById("tradeBox");

  let day = new Date().getDay();
  let symbol = (day === 0 || day === 6) ? "BTCUSDT" : "XAUUSD";

  let price = await getPrice(symbol);
  if (!price) return;

  // reset trade sau 30s
  if (Date.now() - tradeStartTime > 30000) {
    currentTrade = null;
    tradeStartTime = Date.now();
  }

  // tạo trade mới
  if (!currentTrade) {
    let type = Math.random() > 0.5 ? "BUY" : "SELL";
    let lot = (Math.random() * 0.5 + 0.01).toFixed(2);

    currentTrade = {
      symbol,
      type,
      lot,
      entry: price,
    };
  }

  if (currentTrade.symbol !== symbol) {
    currentTrade = null;
    return;
  }

  let { type, lot, entry } = currentTrade;
  let current = price;

  let pnlRaw = (type === "BUY" ? current - entry : entry - current);
  let pnl = (pnlRaw * lot * 100).toFixed(2);

  box.innerHTML = `
    <p style="opacity:0.6">LIVE TRADE</p>
    <p><b>${symbol}</b> • ${type}</p>
    <p>Entry: ${entry.toFixed(2)} (${lot} lot)</p>
    <p>Price: ${current.toFixed(2)}</p>
    <p style="
      color:${pnl >= 0 ? '#00ff9f' : '#ff4d4d'};
      font-weight:bold;
      text-shadow: 0 0 8px ${pnl >= 0 ? '#00ff9f' : '#ff4d4d'};
    ">
      PNL: ${pnl}
    </p>
  `;
}

setInterval(updateTrade, 5000);
updateTrade();
  
/* === DISCORD LANYARD LIVE (Presence + Activities) === */
const avatar = document.getElementById("avatar");
const name = document.getElementById("name");
const tag = document.getElementById("tag");
const activity = document.getElementById("activity");
const statusDot = document.getElementById("statusDot");

const DISCORD_USER_ID = "375870617041240064";

async function updateDiscord() {
  try {
    const res = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_USER_ID}`);
    const json = await res.json();

    if (!json.success || !json.data) {
      name.textContent = "Not Connected";
      activity.textContent = "";
      return;
    }

    const data = json.data;
    const user = data.discord_user;

    // avatar
    if (user.avatar) {
      avatar.src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
    } else {
      avatar.src = `https://cdn.discordapp.com/embed/avatars/0.png`;
    }

    // name + badge
    name.innerHTML = `
      ${user.username}
      <span class="badges">
        <img src="https://raw.githubusercontent.com/edent/SuperTinyIcons/master/images/svg/discord.svg" title="Nitro">
        <img src="https://cdn-icons-png.flaticon.com/512/1055/1055687.png" title="Developer">
        <img src="https://cdn-icons-png.flaticon.com/512/1828/1828884.png" title="Booster">
      </span>
    `;

    tag.textContent = user.global_name || user.username;

    // status
    const status = data.discord_status;
    const colors = {
      online: "#43b581",
      idle: "#faa61a",
      dnd: "#f04747",
      offline: "#747f8d"
    };
    statusDot.style.background = colors[status] || "#747f8d";

    // activity
    activity.innerHTML = "";

    const activities = data.activities || [];

    if (data.spotify) {
      const spotifyEl = document.createElement("div");
      spotifyEl.innerHTML = `
        🎧 ${data.spotify.song}
        <div style="font-size:11px;color:#aaa">
          ${data.spotify.artist}
        </div>
      `;
      activity.appendChild(spotifyEl);
    }

    activities.forEach(act => {
      let text = "";
      const types = ["Playing", "Streaming", "Listening", "Watching", "Custom", "Competing"];
      const typeText = types[act.type] || "";

      if (act.type === 4) {
        text = `💬 ${act.state || ""}`;
      } else {
        text = `${typeText} ${act.name || ""}`;
        if (act.details) text += ` • ${act.details}`;
        if (act.state) text += ` (${act.state})`;
      }

      const el = document.createElement("div");
      el.innerHTML = `<span style="color:cyan">${text}</span>`;
      activity.appendChild(el);
    });

    if (!data.spotify && activities.length === 0) {
      activity.textContent = "Idle";
    }

  } catch (err) {
    console.log("Discord API error:", err);
  }
}
  
updateDiscord();
setInterval(updateDiscord,15000);

document.getElementById("intro").addEventListener("click", () => {
  console.log("CLICK OK");
  enterSite();
});
  
</script>
