<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MOREIRA SYSTEM</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  transition: all 0.3s ease;
}

body {
  margin: 0;
  font-family: monospace;
  color: white;
  overflow: hidden;
  cursor: none;
  background: url("https://images.unsplash.com/photo-1534438327276-14e5300c3a48") no-repeat center/cover;
}

/* VIDEO */
#bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -3;
  filter: brightness(0.7) contrast(1.2);
}

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  z-index: -1;
}

/* PARTICLES */
#particles {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  cursor: pointer;
}

#intro.hide {
  opacity: 0;
  pointer-events: none;
}

#intro h1 {
  animation: glitch 1s infinite;
}

@keyframes glitch {
  0% {text-shadow: 2px 0 red;}
  50% {text-shadow: -2px 0 blue;}
  100% {text-shadow: 2px 0 red;}
}

/* HERO */
.hero {
  position: absolute;
  top: 20%;
  width: 100%;
  text-align: center;
  z-index: 5;
  opacity: 0;
  animation: float 3s infinite;
}

.hero.show { opacity: 1; }

.hero h1 {
  font-size: 70px;
  text-shadow: 0 0 10px white, 0 0 20px cyan, 0 0 40px cyan;
}

@keyframes float {
  0% {transform: translateY(0);}
  50% {transform: translateY(-10px);}
  100% {transform: translateY(0);}
}

/* TERMINAL */
#terminal {
  position: absolute;
  top: 35%;
  width: 100%;
  text-align: center;
  opacity: 0;
}

#terminal.show { opacity: 0.7; }

/* MAIN */
.container {
  display: flex;
  height: 100vh;
  opacity: 0;
}

.container.show { opacity: 1; }

/* SIDE (FIX QUAN TRỌNG) */
.side {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}

.side:hover {
  transform: scale(1.02);
  box-shadow: 0 0 25px rgba(0,255,255,0.3);
}

.left {
  border-right: 1px solid rgba(255,255,255,0.1);
}

/* CARD */
.card {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(0,255,255,0.3);
  box-shadow: 0 0 15px rgba(0,255,255,0.2);
  padding: 15px;
}

/* ICON */
.icons a {
  margin: 5px;
  font-size: 20px;
  color: white;
  text-decoration: none;
}

.icons a:hover {
  color: cyan;
  text-shadow: 0 0 10px cyan;
}

/* CURSOR */
.cursor {
  width: 10px;
  height: 10px;
  background: white;
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
}

/* MUSIC */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  border: 1px solid white;
  padding: 8px 15px;
  cursor: pointer;
}

/* LINE */
.line {
  width: 200px;
  height: 1px;
  background: cyan;
  margin: 10px auto;
  box-shadow: 0 0 10px cyan;
}

@media(max-width:768px){
  .container { flex-direction: column; }
}
</style>
</head>

<body>

<video autoplay muted loop playsinline id="bgVideo">
  <source src="https://cdn.coverr.co/videos/coverr-aerial-view-of-a-city-at-night-5176/1080p.mp4">
</video>

<div class="overlay"></div>
<canvas id="particles"></canvas>
<div class="cursor" id="cursor"></div>

<div id="intro" onclick="enterSite()">
  <h1>ENTER SYSTEM</h1>
</div>

<div class="hero" id="hero">
  <h1>MOREIRA</h1>
  <div class="line"></div>
  <p id="typing"></p>
</div>

<div id="terminal">
  <p>> initializing system...</p>
  <p>> connecting liquidity...</p>
  <p>> scanning market...</p>
</div>

<div class="container" id="main">

<div class="side left">
  <h2>ESPORT</h2>
  <img src="https://lanyard.cnrad.dev/api/375870617041240064?theme=dark">
</div>

<div class="side">
  <h2>TRADER</h2>
  <div class="card" id="tradeBox"></div>
</div>

</div>

<div id="musicBtn" onclick="toggleMusic()">MUSIC</div>

<audio id="music" loop>
  <source src="https://files.catbox.moe/fh9v4n.mp3">
</audio>

<script>
function enterSite(){
  intro.classList.add("hide");
  main.classList.add("show");
  hero.classList.add("show");
  setTimeout(()=>terminal.classList.add("show"),1000);
}

/* typing */
let t="TRADER | GAMER | DEV",i=0;
function typing(){
  if(i<t.length){
    typingEl.innerHTML+=t[i++];
    setTimeout(typing,80);
  }
}
let typingEl=document.getElementById("typing");
typing();

/* cursor */
document.addEventListener("mousemove",e=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

/* fake trade */
setInterval(()=>{
  tradeBox.innerHTML=`<p>BUY XAUUSD</p><p>${(2000+Math.random()*100).toFixed(2)}</p>`;
},3000);
</script>

</body>
</html>
