<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MOREIRA</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: monospace;
  color: white;
  overflow: hidden;
  background: black;
  cursor: none;
}

/* VIDEO BACKGROUND */
video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.3) grayscale(100%);
  z-index: -2;
}

/* DARK OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: -1;
}

/* INTRO */
#intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  cursor: pointer;
  transition: opacity 0.8s;
}

#intro.hide {
  opacity: 0;
  pointer-events: none;
}

#intro h1 {
  font-size: 40px;
  animation: glitch 1s infinite;
}

/* GLITCH */
@keyframes glitch {
  0% {text-shadow: 2px 0 red;}
  50% {text-shadow: -2px 0 blue;}
  100% {text-shadow: 2px 0 red;}
}

/* HERO TEXT */
.hero {
  position: absolute;
  top: 20%;
  width: 100%;
  text-align: center;
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
}

.hero.show {
  opacity: 1;
  transform: translateY(0);
}

.hero h1 {
  font-size: 60px;
  letter-spacing: 5px;
}

.hero p {
  font-size: 18px;
  opacity: 0.7;
}

/* MAIN SPLIT */
.container {
  display: flex;
  height: 100vh;
  opacity: 0;
  transition: 1s;
}

.container.show {
  opacity: 1;
}

/* SIDE */
.side {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(6px);
  transition: 0.3s;
}

.side:hover {
  background: rgba(255,255,255,0.05);
}

.left {
  border-right: 1px solid rgba(255,255,255,0.1);
}

/* CURSOR DOT */
.cursor {
  width: 10px;
  height: 10px;
  background: white;
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 999;
  transition: transform 0.1s;
}

/* MUSIC BUTTON */
#musicBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  border: 1px solid white;
  padding: 8px 15px;
  cursor: pointer;
}

/* MOBILE */
@media(max-width:768px){
  .container {
    flex-direction: column;
  }
  .hero h1 {
    font-size: 40px;
  }
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline>
  <source src="https://cdn.coverr.co/videos/coverr-anime-style-city-1560/1080p.mp4">
</video>

<div class="overlay"></div>

<!-- CURSOR -->
<div class="cursor" id="cursor"></div>

<!-- INTRO -->
<div id="intro" onclick="enterSite()">
  <h1>ENTER SYSTEM</h1>
</div>

<!-- HERO -->
<div class="hero" id="hero">
  <h1>MOREIRA</h1>
  <p>TRADER | GAMER | DEV</p>
</div>

<!-- MAIN -->
<div class="container" id="main">

<div class="side left">
  <h2>ESPORT</h2>
</div>

<div class="side">
  <h2>TRADER</h2>
</div>

</div>

<!-- MUSIC -->
<div id="musicBtn" onclick="toggleMusic()">MUSIC: OFF</div>

<audio id="music" loop>
  <source src="https://files.catbox.moe/fh9v4n.mp3">
</audio>

<script>
let music = document.getElementById("music");
let btn = document.getElementById("musicBtn");
let isPlaying = false;

function enterSite() {
  document.getElementById("intro").classList.add("hide");
  document.getElementById("main").classList.add("show");
  document.getElementById("hero").classList.add("show");

  music.play().then(()=>{
    isPlaying = true;
    btn.innerText = "MUSIC: ON";
  }).catch(()=>{});
}

function toggleMusic() {
  if (isPlaying) {
    music.pause();
    btn.innerText = "MUSIC: OFF";
  } else {
    music.play();
    btn.innerText = "MUSIC: ON";
  }
  isPlaying = !isPlaying;
}

/* CURSOR FOLLOW */
let cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e => {
  cursor.style.top = e.clientY + "px";
  cursor.style.left = e.clientX + "px";
});
</script>

</body>
</html>
